name: "Corporate Security Guardrail"
on:
  push:
    branches: [ "main", "master" ]
jobs:
  # STAGE 1: Secrets Scanning
  secrets-analysis:
    name: "Gitleaks Secrets Scan"
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" zricethezav/gitleaks:latest detect --source="/path" --report-path="/path/gitleaks_results.json" || true
      - name: Push Secrets to DefectDojo
        run: |
          curl -X POST "http://localhost:8080/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "scan_type=Gitleaks Scan" \
          -F "engagement=1" \
          -F "file=@gitleaks_results.json"

  # STAGE 2: Code Vulnerability Scan
  static-analysis:
    name: "Semgrep Code Scan"
    runs-on: self-hosted
    needs: secrets-analysis
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Run Semgrep Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=p/php --json > semgrep_results.json
      - name: Push SAST to DefectDojo
        run: |
          curl -X POST "http://localhost:8080/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "scan_type=Semgrep JSON Report" \
          -F "engagement=1" \
          -F "file=@semgrep_results.json"

  # STAGE 3: Infrastructure Linting
  infra-lint:
    name: "Hadolint Dockerfile Scan"
    runs-on: self-hosted
    needs: static-analysis
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Run Hadolint
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile > hadolint_results.json || true
      - name: Push Linting to DefectDojo
        run: |
          curl -X POST "http://localhost:8080/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "scan_type=Hadolint Dockerfile check" \
          -F "engagement=1" \
          -F "file=@hadolint_results.json"

  # STAGE 4: Software Supply Chain Security (SCA & SBOM)
  software-supply-chain:
    name: "SCA and SBOM Analysis"
    runs-on: self-hosted
    needs: infra-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Generate CycloneDX Inventory List
      - name: Generate CycloneDX SBOM
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" aquasec/trivy fs --format cyclonedx --output /src/cyclonedx_results.json /src

      - name: Push CycloneDX SBOM to DefectDojo
        run: |
          curl -X POST "http://localhost:8080/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "scan_type=CycloneDX Scan" \
          -F "engagement=1" \
          -F "file=@cyclonedx_results.json"

      # 2. Scan the code dependencies for CVE flaws (Replaces Dependency-Check)
      - name: Run Trivy Filesystem SCA Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" aquasec/trivy fs --format json --output /src/trivy_fs_results.json /src

      - name: Push Filesystem SCA to DefectDojo
        run: |
          curl -X POST "http://localhost:8080/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "scan_type=Trivy Scan" \
          -F "engagement=1" \
          -F "file=@trivy_fs_results.json"

  # STAGE 5: Container Dependency Scan
  container-security:
    name: "Trivy Supply Chain Scan"
    runs-on: self-hosted
    needs: software-supply-chain
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Build Application Container
        run: docker build -t dvwa-local:${{ github.sha }} .
      - name: Run Trivy Image Scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image --format json dvwa-local:${{ github.sha }} > trivy_results.json
      - name: Push Container Scan to DefectDojo
        run: |
          curl -X POST "http://localhost:8080/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "scan_date=$(date +%Y-%m-%d)" \
          -F "scan_type=Trivy Scan" \
          -F "engagement=1" \
          -F "file=@trivy_results.json"
